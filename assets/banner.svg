<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f14"/>
      <stop offset="1" stop-color="#11161d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7dd3fc" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#7dd3fc" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7dd3fc" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <!-- subtle grid -->
  <g stroke="#1c2530" stroke-width="1">
    <path d="M0 90 H1280 M0 180 H1280 M0 270 H1280"/>
    <path d="M213 0 V360 M426 0 V360 M640 0 V360 M853 0 V360 M1066 0 V360"/>
  </g>

  <!-- pipeline glyph: spec + config -> [ ] -> sdk -->
  <g transform="translate(96,150)" fill="none" stroke="#3b4756" stroke-width="2">
    <rect x="0" y="-26" width="92" height="22" rx="4"/>
    <rect x="0" y="6" width="92" height="22" rx="4"/>
    <path d="M92 -15 C 130 -15, 130 12, 168 12 M92 17 C 130 17, 130 12, 168 12" stroke="#46566a"/>
    <rect x="168" y="-14" width="120" height="52" rx="8" stroke="url(#accent)" stroke-width="2.5"/>
    <path d="M288 12 H 372" stroke="#46566a"/>
    <path d="M360 4 l 14 8 l -14 8" stroke="#46566a"/>
  </g>
  <text x="118" y="142" fill="#6b7a8d" font-size="13">openapi</text>
  <text x="118" y="174" fill="#6b7a8d" font-size="13">stainless.yml</text>
  <text x="214" y="166" fill="#7dd3fc" font-size="13">IR</text>

  <!-- wordmark -->
  <text x="500" y="150" fill="#e6edf3" font-size="84" font-weight="700" letter-spacing="-2">stainful</text>
  <rect x="502" y="170" width="300" height="3" fill="url(#fade)"/>
  <text x="504" y="208" fill="url(#accent)" font-size="27" font-weight="600">the open-source Stainless</text>
  <text x="504" y="246" fill="#8b97a6" font-size="18">point your existing stainless.yml at it — same SDK, zero migration, no SaaS</text>

  <text x="504" y="300" fill="#5b6675" font-size="15">OpenAPI 3.x  ·  idiomatic Python  ·  typed errors · auto-pagination · streaming · async  ·  Apache-2.0</text>
</svg>
