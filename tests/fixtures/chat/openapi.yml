openapi: 3.0.0
info:
  title: Chat
  version: 1.2.0
servers:
  - url: https://api.chat.example
security:
  - BearerAuth: []
paths:
  /chat/completions:
    post:
      summary: Create a chat completion (optionally streamed via SSE).
      operationId: createChatCompletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: Completion (or an SSE stream of ChatCompletionChunk).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletion'
        '4XX':
          description: Typed error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    ChatRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
        stream:
          type: boolean
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant]
        content:
          type: string
        # nullable (present, may be null) — must stay distinct from optional
        name:
          type: string
          nullable: true
    ChatCompletion:
      type: object
      required: [id, choices]
      properties:
        id:
          type: string
        choices:
          type: array
          items:
            $ref: '#/components/schemas/Choice'
    Choice:
      type: object
      required: [index, message]
      properties:
        index:
          type: integer
        message:
          $ref: '#/components/schemas/ChatMessage'
    ChatCompletionChunk:
      type: object
      required: [id, delta]
      properties:
        id:
          type: string
        delta:
          type: string
    # oneOf + discriminator -> a real tagged union (RESEARCH §4 #8)
    Event:
      oneOf:
        - $ref: '#/components/schemas/MessageEvent'
        - $ref: '#/components/schemas/ErrorEvent'
      discriminator:
        propertyName: type
        mapping:
          message: '#/components/schemas/MessageEvent'
          error: '#/components/schemas/ErrorEvent'
    MessageEvent:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
        text:
          type: string
    ErrorEvent:
      type: object
      required: [type, code]
      properties:
        type:
          type: string
        code:
          type: integer
    ErrorBody:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message]
          properties:
            message:
              type: string
            code:
              type: string
